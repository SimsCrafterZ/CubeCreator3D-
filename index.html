<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:title" content="Minecraft 3DS Community" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.minecraft3ds.org/" />
  <meta property="og:image" content="https://raw.githubusercontent.com/Minecraft-3DS-Community/Minecraft-3DS-Community.github.io/refs/heads/main/seeds/img/noimg.png" />

  <meta name="description" content="The one-stop shop for everything related to Minecraft: New Nintendo 3DS Edition." />

  <title>Home • Cube Creator 3D Community</title>

  <link href="style.css" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
  <link rel="stylesheet" href="plugins/flickity/flickity.css">
  <script src="plugins/flickity/flickity.pkgd.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #825a21;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 3.5em;
      display: flex;
      align-items: center;
    }

    .layout {
      display: flex;
      margin-top: 60px;
    }

    .main {
      flex: 1;
      padding: 16px;
    }

    .sidebar {
      flex: 0 0 30%;
      height: calc(100vh - 50px);
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url(img/bg/stone.png);
      background-size: 32px;
    }

    .gallery-cell {
      width: 250px;
      height: 150px;
      margin-right: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: skyblue;
      border: 2px solid white;
    }

    .gallerysubtitle {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-family: 'Minecraft Regular';
    }

    .gallerysubtitle a {
      color: white;
      text-decoration: none;
    }

    .gallerysubtitle a:hover {
      text-decoration: underline;
    }

    .text {
      margin: 25px;
      max-width: 66%;
      position: absolute;
      margin-top: 320px;
    }

    .overview {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: rgb(94,94,99);
      color: white;
      font-family: 'Minecraft Regular';
    }

    .textLayout {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .textMain {
      flex: 1;
      background: rgb(34,35,39);
      padding: 10px;
      color: white;
    }

    .textSidebar {
      width: 40%;
      background: rgb(78,85,105);
      padding: 10px;
      color: white;
    }

    .boxHeader {
      font-family: 'Minecraft Regular';
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16pt;
    }

    .didYouKnow {
      margin-top: 10px;
    }

    .newsHeader {
      font-family: 'Minecraft Regular';
      padding: 10px;
      background: url(img/bg/stone_bricks.png);
      color: white;
    }

    #news {
      padding: 10px;
      font-family: 'Minecraft Regular';
      color: #ccc;
      overflow-y: scroll;
      height: 100%;
    }

    .copyright {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      background: black;
      color: rgba(255,255,255,0.5);
      padding: 8px;
      font-family: 'Minecraft Regular';
    }
  </style>
</head>

<body>

<div class="header">
  <a href="/">
    <img src="img/New_Nintendo_3DS_Edition.webp" style="width:180px;">
  </a>
</div>

<div class="layout">

  <main class="main">

    <div class="gallery js-flickity" data-flickity-options='{"autoPlay": 3500, "wrapAround": true}'>

      <div class="gallery-cell">
        <img src="img/logos/unistore.png" style="width:200px;" onclick="window.location.href='/unistore/';">
      </div>

      <div class="gallery-cell">
        <img src="img/news/featured/cubecreator3dminecraft.jpg" style="width:500px;">
        <div class="gallerysubtitle">
          <a href="https://github.com/Axonic3D/CC3D-Minecraft-Conversion-Mod">
            Cube Creator 3D: Minecraft Conversion Mod
          </a>
        </div>
      </div>

    </div>

  </main>

  <aside class="sidebar">
    <div class="newsHeader">Latest News</div>
    <div id="news"></div>
  </aside>

</div>

<div class="text">

  <div class="overview">
    <img src="/img/gui/home.png" width="24">
    Welcome to the Cube Creator 3D Community website.
  </div>

  <div class="textLayout">

    <div class="textMain">
      <div class="boxHeader">
        <img src="/img/gui/oreui/worlds.png" width="24">
        Featured Video
      </div>

      <iframe width="560" height="315"
        src="https://www.youtube-nocookie.com/embed/Lluw07pKd60"
        allowfullscreen>
      </iframe>
    </div>

    <div class="textSidebar">
      <div class="boxHeader">
        <img src="/img/gui/oreui/other.png" width="24">
        Did you know?
      </div>

      <div class="didYouKnow">
        Cube Creator 3D was released on April 23, 2015.
      </div>
    </div>

  </div>
</div>

<div class="copyright">
  © 2026 Cube Creator 3D Community. All Rights Reserved.
</div>

</body>
</html>
